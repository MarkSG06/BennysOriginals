<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background-color: #000;
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .content {
        background-color: #101010;
        height: 70dvh;
        width: 70%;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        justify-self: center;
    }
</style>

<body>
    <section class="content">
        <div class="featured">
            <div class="featured-info">
                <div class="title">
                    <h1>Empleado Destacado</h1>
                    <p>Reconocimiento semanal del mejor desempeño</p>
                </div>
                <div class="user">
                    <span>L</span>
                    <div class="userInfo">
                        <h3>LuciaR</h3>
                        <p>Líder de ventas de la semana</p>
                    </div>
                </div>
            </div>
            <div class="info">
                <div class="sells">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                        <path fill="currentColor"
                            d="M12.32 8a3 3 0 0 0-2-.7H5.63A1.59 1.59 0 0 1 4 5.69a2 2 0 0 1 0-.25a1.59 1.59 0 0 1 1.63-1.33h4.62a1.59 1.59 0 0 1 1.57 1.33h1.5a3.08 3.08 0 0 0-3.07-2.83H8.67V.31H7.42v2.3H5.63a3.08 3.08 0 0 0-3.07 2.83a2 2 0 0 0 0 .25a3.07 3.07 0 0 0 3.07 3.07h4.74A1.59 1.59 0 0 1 12 10.35a2 2 0 0 1 0 .34a1.59 1.59 0 0 1-1.55 1.24h-4.7a1.59 1.59 0 0 1-1.55-1.24H2.69a3.08 3.08 0 0 0 3.06 2.73h1.67v2.27h1.25v-2.27h1.7a3.08 3.08 0 0 0 3.06-2.73v-.34A3.06 3.06 0 0 0 12.32 8" />
                    </svg>
                    <div class="sellsInfo">
                        <h3>100</h3>
                        <p>Ventas</p>
                    </div>
                </div>
                <div class="hours">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12,1A11,11,0,1,0,23,12,11,11,0,0,0,12,1Zm0,20a9,9,0,1,1,9-9A9,9,0,0,1,12,21Z" />
                        <rect width="2" height="7" x="11" y="6" fill="currentColor" rx="1">
                            <animateTransform attributeName="transform" dur="9s" repeatCount="indefinite" type="rotate"
                                values="0 12 12;360 12 12" />
                        </rect>
                        <rect width="2" height="9" x="11" y="11" fill="currentColor" rx="1">
                            <animateTransform attributeName="transform" dur="0.75s" repeatCount="indefinite"
                                type="rotate" values="0 12 12;360 12 12" />
                        </rect>
                    </svg>
                    <div class="hoursInfo">
                        <h3>100</h3>
                        <p>Horas</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="ranking"></div>
    </section>
</body>

</html>
